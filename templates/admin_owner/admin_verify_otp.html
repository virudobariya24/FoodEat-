{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification - Foodeat</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="{% static 'js/3.4.js' %}"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50:'#fff7ed', 100:'#ffedd5', 500:'#ff6f00', 600:'#ea580c', 700:'#c2410c' }
          }
        }
      }
    }
  </script>
  <style>
    .glow-orange {
      box-shadow: 0 10px 30px -10px rgba(255, 111, 0, 0.2);
    }
    .otp-input:focus {
      border-color: #ff6f00;
      box-shadow: 0 0 0 4px rgba(255, 111, 0, 0.1);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 flex min-h-screen items-center justify-center p-4 font-sans">

  <!-- Floating Subtle Glows -->
  <div class="absolute w-96 h-96 rounded-full bg-brand-500/5 blur-[120px] top-1/4 left-1/3 pointer-events-none"></div>
  <div class="absolute w-96 h-96 rounded-full bg-amber-500/5 blur-[120px] bottom-1/4 right-1/4 pointer-events-none"></div>

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-3xl border border-slate-100 shadow-2xl overflow-hidden glow-orange relative z-10 p-6 md:p-8 space-y-6">
    
    <!-- Header -->
    <div class="text-center space-y-2">
      <div class="w-12 h-12 rounded-2xl bg-brand-500/10 border border-brand-500/20 text-brand-500 flex items-center justify-center mx-auto text-xl shadow-sm">
        <i class="fa-solid fa-shield-envelope"></i>
      </div>
      <h2 class="text-xl font-extrabold text-slate-800 tracking-tight leading-tight">Verify Your Email</h2>
      <p class="text-xs font-semibold text-slate-400">We have sent a 6-digit OTP verification code to your registered business email address.</p>
    </div>

    <!-- Django Messages -->
    {% if messages %}
      <div class="space-y-2">
        {% for message in messages %}
          <div class="p-3 text-xs rounded-xl font-semibold border {% if message.tags == 'error' %}bg-rose-50 text-rose-600 border-rose-100{% else %}bg-emerald-50 text-emerald-600 border-emerald-100{% endif %} flex items-center justify-between gap-2">
            <div class="flex items-center gap-2">
              <i class="fa-solid {% if message.tags == 'error' %}fa-circle-xmark{% else %}fa-circle-check{% endif %} text-sm"></i>
              <span>{{ message }}</span>
            </div>
            <button type="button" onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600 transition focus:outline-none">
              <i class="fa-solid fa-xmark text-sm"></i>
            </button>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <!-- OTP Form -->
    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label for="otp" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Enter Verification OTP</label>
        <div class="relative flex items-center">
          <i class="fa-solid fa-key absolute left-4 text-brand-500 text-xs"></i>
          <input type="text" name="otp" id="otp" required maxlength="6" placeholder="******" autocomplete="off"
                 class="w-full h-12 pl-10 pr-4 text-sm rounded-xl text-slate-700 outline-none otp-input border border-slate-200 bg-slate-50/50 font-bold tracking-widest text-center">
        </div>
      </div>

      <button type="submit" class="w-full h-12 bg-gradient-to-r from-brand-500 to-amber-500 hover:scale-[1.02] active:scale-[0.98] text-white font-bold text-sm rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-md shadow-brand-500/10">
        <i class="fa-solid fa-circle-check text-xs"></i> Verify & Register
      </button>
    </form>

    <div class="w-full h-px bg-slate-100"></div>

    <div class="text-center text-xs font-bold text-slate-400 hover:text-slate-600">
      <a href="{% url 'adminregister' %}" class="flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-arrow-left text-[10px]"></i> Back to Registration
      </a>
    </div>

  </div>

</body>
</html>
