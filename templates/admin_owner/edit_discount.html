{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Discount - Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="{% static 'js/3.4.js' %}"></script>
  <style>
    :root {
      --primary-color: #ff6f00;
      --primary-hover: #e65c00;
      --accent-color: #27ae60;
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      display: flex;
      min-height: 100vh;
      color: var(--text-main);
    }

    .main-content {
      margin-left: 260px;
      padding: 50px 30px;
      flex-grow: 1;
      width: calc(100% - 260px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
    }

    @media (max-width: 992px) {
      .main-content { margin-left: 70px; width: calc(100% - 70px); padding: 40px 20px; }
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .main-content { margin-left: 0; width: 100%; padding: 30px 15px; }
    }

    .form-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      border: 1px solid #f1f5f9;
      width: 100%;
      max-width: 550px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #0f172a;
      text-align: center;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h2 i {
      color: var(--primary-color);
    }

    .product-info-box {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      margin-bottom: 25px;
    }

    .product-image {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid #f97316;
    }

    .product-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #334155;
      margin: 0;
    }

    /* Target standard django form fields inside paragraphs */
    form p {
      margin-bottom: 20px;
    }

    form label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #475569;
    }

    input:not([type="radio"]):not([type="checkbox"]),
    select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #334155;
      background-color: #f8fafc;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    input:not([type="radio"]):not([type="checkbox"]):focus,
    select:focus {
      border-color: var(--primary-color);
      background-color: #ffffff;
      outline: none;
      box-shadow: 0 0 0 4px rgba(255, 111, 0, 0.15);
    }

    button[type="submit"] {
      margin-top: 25px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--primary-color), #ff8f00);
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 4px 12px rgba(255, 111, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255, 111, 0, 0.4);
      background: linear-gradient(135deg, #e65c00, #ff8f00);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  {% include 'admin_owner/sidebar.html' %}

  <!-- Main Content -->
  <div class="main-content">
    <div class="form-container">
      <h2><i class="fas fa-edit"></i> Edit Discount</h2>

      <div class="product-info-box">
        {% if discount.product.food_image %}
          <img src="{{ discount.product.food_image.url }}" alt="Product Image" class="product-image">
        {% endif %}
        <p class="product-name">Product: {{ discount.product.food_name }}</p>
      </div>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"><i class="fas fa-save"></i> Update Discount</button>
      </form>
    </div>
  </div>

</body>
</html>
